spring:
#  data:
#    redis:
#      url: ${REDIS_URL}
#      timeout: 200ms
  application:
    name: database-mcp-java
  main:
    banner-mode: off
  ai:
    mcp:
      server:
        name: database-mcp
        version: 0.1.0
        type: sync
        protocol: sse
        stdio: ${MCP_STDIO_ENABLED:false}
        instructions: 提供数据库结构查看和受控 SQL 执行能力的通用数据库 MCP 服务。

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8000}

database-mcp:
  database-type: ${DATABASE_TYPE:postgresql}
  access-mode: ${DATABASE_MCP_ACCESS_MODE:unrestricted}
  restricted-timeout-seconds: 30
  maximum-pool-size: 5
  database-uri: ${DATABASE_URI:}
  database-host: ${DATABASE_HOST:}
  database-port: ${DATABASE_PORT:}
  database-name: ${DATABASE_NAME:}
  database-username: ${DATABASE_USERNAME:}
  database-password: ${DATABASE_PASSWORD:}

  # SQL 授权（默认关闭）。完整说明见 docs/permission-control.md。
  # permission.enabled=true 时必须恰好存在 1 个 SqlAuthorizer Bean；可由接入项目自定义，
  # 也可启用下面的内置指标实现。自定义实现时不要启用 metric。
  # 指标实现会在启动时校验以下配置（任一缺失即拒绝启动）：
  #   metric.protected-tables / metric.metric-columns / metric.scene-columns
  #   恰好 1 个 MetricPermissionProvider Bean；使用内置 Provider 时 authorization-query 必须含且仅含一个占位符
  # 如需对接其他系统，保持 metric.enabled=false 并自实现 SqlAuthorizer；接口只接收 userId 和原始 SQL。
  # permission:
  #   enabled: true
  #   metric:
  #     enabled: true
  #     protected-tables:                # 受保护白名单，未列入的表不进入鉴权
  #       - <schema>.<table>
  #     metric-columns:                  # 受保护表上代表"指标"的列名
  #       - quota_id
  #     scene-columns:                   # 受保护表上代表"场景"的列名
  #       - quota_scene
  #     provider:
  #       authorization-query: |         # 占位符仅支持 ${user_id} / ${p_user_id} / [${user_id}] 及其引号包裹形式
  #         SELECT quota_id, quota_scenes
  #         FROM <schema>.user_metric_auth
  #         WHERE user_id = '${user_id}'
  #       scene-delimiters: [",", "，", ";", "|"]   # quota_scenes 拆分符；不配默认同上
  #       timeout-seconds: 10            # 超时→permission_authorizer_timeout
  #       cache:
  #         enabled: false              # 生产问数场景显式设为 true；默认 false
  #         ttl-seconds: 300            # 固定 TTL，命中不续期
  #         key-prefix: "database-mcp:permission:metric:v1:"

# Doris 方言：通过 spring.profiles.active=doris 激活 application-doris.yml，
# 或在启动时通过环境变量 DATABASE_TYPE=doris + DATABASE_URI=jdbc:mysql://host:9030/db 直接覆盖。
# 完整示例与 5 项 Doris MySQL 兼容参数见 application-doris.yml。
