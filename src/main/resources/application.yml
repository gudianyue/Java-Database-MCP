spring:
  application:
    name: postgres-mcp-java
  main:
    banner-mode: off
  ai:
    mcp:
      server:
        name: postgres-mcp
        version: 0.1.0
        type: sync
        protocol: sse
        stdio: ${MCP_STDIO_ENABLED:false}
        instructions: 提供数据库结构查看和受控 SQL 执行能力的 PostgreSQL MCP 服务。

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8000}

postgres-mcp:
  access-mode: unrestricted
  restricted-timeout-seconds: 30
  maximum-pool-size: 5
  database-uri: ${DATABASE_URI:}
  database-host: ${POSTGRES_HOST:}
  database-port: ${POSTGRES_PORT:5432}
  database-name: ${POSTGRES_DATABASE:${POSTGRES_DB:}}
  database-username: ${POSTGRES_USERNAME:${POSTGRES_USER:}}
  database-password: ${POSTGRES_PASSWORD:}
